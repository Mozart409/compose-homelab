services:
  tsbridge:
    image: ghcr.io/jtdowney/tsbridge:v0.14.0
    container_name: tsbridge
    command: ["--provider", "docker"]
    restart: unless-stopped
    stop_grace_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - tsbridge_state:/var/lib/tsbridge
    environment:
      - TS_OAUTH_CLIENT_ID=${TS_OAUTH_CLIENT_ID}
      - TS_OAUTH_CLIENT_SECRET=${TS_OAUTH_CLIENT_SECRET}
    labels:
      - "tsbridge.tailscale.oauth_client_id_env=TS_OAUTH_CLIENT_ID"
      - "tsbridge.tailscale.oauth_client_secret_env=TS_OAUTH_CLIENT_SECRET"
      - "tsbridge.tailscale.state_dir=/var/lib/tsbridge"
  hofvarpnir:
    image: ghcr.io/mozart409/hofvarpnir:0.1.8
    container_name: hofvarpnir
    restart: unless-stopped
    stop_grace_period: 5s
    depends_on:
      hofvarpnir_db:
        condition: service_healthy
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      MAX_CONCURRENT_DOWNLOADS: 3
      DOWNLOAD_TIMEOUT_HOURS: 4
      MAX_DOWNLOAD_ATTEMPTS: 5
      RATE_LIMIT_DELAY_SECS: 60
      RUST_LOG: info,hofvarpnir=info,sqlx=warn
      DATABASE_URL: postgresql://postgres:postgres@hofvarpnir_db:5432/hofvarpnir
      DEFAULT_OUTPUT_DIR: /var/lib/hofvarpnir/downloads
    volumes:
      - ./hofvarpnir:/var/lib/hofvarpnir/downloads
    labels:
      - "tsbridge.enabled=true"
      - "tsbridge.service.name=hofvarpnir"
      - "tsbridge.service.port=3000"
      - "tsbridge.service.write_timeout=0s"
      - "tsbridge.service.flush_interval=-1ms"
      - "tsbridge.service.tags=tag:homelab"
  hofvarpnir_db:
    image: postgres:17-trixie
    container_name: hofvarpnir_db
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - hofvarpnir_pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hofvarpnir
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 15s
    labels:
      - 'wud.tag.include=^\d+(\.\d+)?-trixie$$'
  tandoor:
    image: vabene1111/recipes:2.6.4
    container_name: tandoor
    restart: unless-stopped
    stop_grace_period: 30s
    network_mode: service:ts-tandoor
    volumes:
      - staticfiles:/opt/recipes/staticfiles
      - ./mediafiles:/opt/recipes/mediafiles
    depends_on:
      - tandoor_db
    environment:
      TZ: Europe/Berlin
      TANDOOR_PORT: 8080
      # https://github.com/TandoorRecipes/recipes/issues/3478
      ALLOWED_HOSTS: tandoor.dropbear-butterfly.ts.net,127.0.0.1
      SECRET_KEY: Ex5PEs6AB+tcLAo9JSWZh5AwR2eDdIGyp1Ahsgqvcma0pj9bzj
      SOCIAL_PROVIDERS: ${TANDOOR_SOCIAL_PROVIDERS}
      SOCIALACCOUNT_PROVIDERS: ${TANDOOR_SOCIALACCOUNT_PROVIDERS}
      DB_ENGINE: django.db.backends.postgresql
      POSTGRES_HOST: tandoor_db
      POSTGRES_DB: tandoor
      POSTGRES_PORT: 5432
      POSTGRES_USER: tandoor
      POSTGRES_PASSWORD: abc123abc123
    labels:
      - 'wud.tag.include=^\d+\.\d+\.\d+$$'
  tandoor_db:
    image: postgres:18.0-alpine3.22
    container_name: tandoor_db
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - tandoor_pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: tandoor
      POSTGRES_PASSWORD: abc123abc123
      POSTGRES_DB: tandoor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 15s
    labels:
      - 'wud.tag.include=^\d+\.\d+\.\d+$$'
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.10.2
    container_name: node_exporter
    stop_grace_period: 30s
    command:
      - "--path.rootfs=/host"
    network_mode: service:ts-node-exporter
    pid: host
    restart: unless-stopped
    healthcheck:
      test: [
        "CMD",
        "wget",
        "--no-verbose",
        "--tries=1",
        "--spider",
        "http://localhost:9100/metrics",
      ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - "/:/host:ro,rslave"
    labels:
      - 'wud.tag.include=^v\d+\.\d+\.\d+$$'
  syncthing:
    image: lscr.io/linuxserver/syncthing:2.0.10
    container_name: syncthing
    stop_grace_period: 30s
    hostname: homelab #optional
    environment:
      - PUID=0
      - PGID=0
      - TZ=Etc/UTC
    volumes:
      - ./syncthing/config:/config
      - ./blueray:/blueray
      - ./movies:/movies
      - ./youtube:/youtube
      - ./series:/series
      - ./tv:/tv
      - ./audio:/audio
    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8384/rest/noauth/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - 'wud.tag.include=^\d+\.\d+\.\d+$$'
  whatsupdocker:
    image: ghcr.io/getwud/wud:8.2.2
    tty: true
    stdin_open: true
    container_name: wud
    stop_grace_period: 30s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: service:ts-wud
    restart: unless-stopped
    healthcheck:
      test: curl --fail http://localhost:${WUD_SERVER_PORT:-3000}/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - 'wud.tag.include=^\d+\.\d+\.\d+$$'
      - "wud.link.template=https://github.com/getwud/wud/releases/tag/$${major}.$${minor}.$${patch}"
  tclip:
    container_name: tclip
    stop_grace_period: 30s
    volumes:
      - ./tclip_storage:/data
    environment:
      - DATA_DIR=/data
      - "TS_AUTHKEY=${TS_AUTH_KEY}"
      - ENABLE_LINE_NUMBERS=true
      - ENABLE_WORD_WRAP=true
    restart: unless-stopped
    image: ghcr.io/tailscale-dev/tclip:latest@sha256:c6fc003a7ce24eff96a36b6055b316c307a798399555dba545452e6aeafca3c7
    labels:
      - "wud.tag.include=latest"
      - "wud.watch.digest=true"
  jellyfin:
    container_name: jellyfin
    stop_grace_period: 30s
    tty: true
    stdin_open: true
    depends_on:
      - ts-jellyfin
    environment:
      - PUID=0
      - PGID=0
      - TZ=Etc/CET
      - JELLYFIN_PublishedServerUrl=https://jellyfin.dropbear-butterfly.ts.net
    healthcheck:
      interval: 1m
      retries: 3
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      timeout: 30s
    image: ghcr.io/linuxserver/jellyfin:10.11.7
    network_mode: service:ts-jellyfin
    labels:
      - 'wud.tag.include=^\d{1,2}\.\d+\.\d+$'
      - "wud.link.template=https://github.com/linuxserver/docker-jellyfin/pkgs/container/jellyfin/versions"
    restart: unless-stopped
    volumes:
      - ${PWD}/jellyfin/library:/config
      - ${PWD}/hofvarpnir/completed:/data/hofvarpnir
      - ${PWD}/movies:/data/my_movies
      - ${PWD}/blueray:/data/blueray
      - ${PWD}/series:/data/series
      - ${PWD}/tv:/data/tv
      - ${PWD}/audio:/data/audio
  valkey-searxng:
    container_name: valkey-searxng
    image: valkey/valkey:9.0.3-alpine3.23
    restart: unless-stopped
    stop_grace_period: 30s
    network_mode: service:ts-searxng
    command: valkey-server --bind 0.0.0.0
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      - 'wud.tag.include=^\d+\.\d+\.\d+-alpine'
      - "wud.link.template=https://github.com/valkey-io/valkey/releases/tag/$${major}.$${minor}.$${patch}"
  searxng:
    container_name: searxng
    stop_grace_period: 30s
    depends_on:
      ts-searxng:
        condition: service_started
      valkey-searxng:
        condition: service_healthy
    environment:
      - BASE_URL=https://searxng.dropbear-butterfly.ts.net/
      - INSTANCE_NAME=SearxNG
    healthcheck:
      interval: 1m30s
      retries: 3
      start_period: 40s
      test: ["CMD", "wget", "-nv", "-t1", "--spider", "0.0.0.0:8080/"]
      timeout: 10s
    image: searxng/searxng:2025.12.30-a5c946a32
    labels:
      - homepage.group=Search
      - homepage.name=SearxNG
      - homepage.icon=emby.png
      - homepage.href=http://searxng.home/
      - homepage.description=Meta search engine
      - 'wud.tag.include=^v\d+\.\d+\.\d+$$'
      - "wud.link.template=https://github.com/searxng/searxng/releases/tag/$${major}.$${minor}.$${patch}"
    network_mode: service:ts-searxng
    restart: unless-stopped
    volumes:
      - ${PWD}/searxng:/etc/searxng
  ts-jellyfin:
    stop_grace_period: 30s
    cap_add:
      - net_admin
      - sys_module
    container_name: ts-jellyfin
    devices:
      - /dev/net/tun:/dev/net/tun
    dns:
      - 100.100.100.100 # For tailnet address (<mach>.<tailnet>.ts.net) lookups.
      - 1.1.1.1 # For external lookups.
    environment:
      - "TS_AUTHKEY=${TS_AUTH_KEY}"
      # - "TS_EXTRA_ARGS=--advertise-tags=tag:container"
      - "TS_SERVE_CONFIG=/config/jellyfin.json"
      - "TS_STATE_DIR=/var/lib/tailscale"
      - "TS_USERSPACE=false"
    hostname: jellyfin
    image: tailscale/tailscale:v1.94.2
    restart: unless-stopped
    volumes:
      - ${PWD}/tailscale-jellyfin/state:/var/lib/tailscale
      - ${PWD}/config:/config
    labels:
      - 'wud.tag.include=^v\d+\.\d+\.\d+$$'
      - "wud.link.template=https://github.com/tailscale/tailscale/releases/tag/$${major}.$${minor}.$${patch}"
  ts-searxng:
    stop_grace_period: 30s
    cap_add:
      - net_admin
      - sys_module
    container_name: ts-searxng
    devices:
      - /dev/net/tun:/dev/net/tun
    dns:
      - 100.100.100.100 # For tailnet address (<mach>.<tailnet>.ts.net) lookups.
      - 1.1.1.1 # For external lookups.
    environment:
      - "TS_AUTHKEY=${TS_AUTH_KEY}"
      # - "TS_EXTRA_ARGS=--advertise-tags=tag:container"
      - "TS_SERVE_CONFIG=/config/searxng.json"
      - "TS_STATE_DIR=/var/lib/tailscale"
      - "TS_USERSPACE=false"
    hostname: searxng
    image: tailscale/tailscale:v1.94.2
    restart: unless-stopped
    volumes:
      - ${PWD}/tailscale-searxng/state:/var/lib/tailscale
      - ${PWD}/config:/config
    labels:
      - 'wud.tag.include=^v\d+\.\d+\.\d+$$'
      - "wud.link.template=https://github.com/tailscale/tailscale/releases/tag/$${major}.$${minor}.$${patch}"
  ts-wud:
    stop_grace_period: 30s
    cap_add:
      - net_admin
      - sys_module
    container_name: ts-wud
    devices:
      - /dev/net/tun:/dev/net/tun
    dns:
      - 100.100.100.100 # For tailnet address (<mach>.<tailnet>.ts.net) lookups.
      - 1.1.1.1 # For external lookups.
    environment:
      - "TS_AUTHKEY=${TS_AUTH_KEY}"
      # - "TS_EXTRA_ARGS=--advertise-tags=tag:container"
      - "TS_SERVE_CONFIG=/config/wud.json"
      - "TS_STATE_DIR=/var/lib/tailscale"
      - "TS_USERSPACE=false"
    hostname: wud
    image: tailscale/tailscale:v1.94.2
    restart: unless-stopped
    volumes:
      - ${PWD}/tailscale-wud-data/state:/var/lib/tailscale
      - ${PWD}/config:/config
    labels:
      - 'wud.tag.include=^v\d+\.\d+\.\d+$$'
      - "wud.link.template=https://github.com/tailscale/tailscale/releases/tag/$${major}.$${minor}.$${patch}"
  ts-node-exporter:
    stop_grace_period: 30s
    cap_add:
      - net_admin
      - sys_module
    container_name: ts-node-exporter
    devices:
      - /dev/net/tun:/dev/net/tun
    dns:
      - 100.100.100.100 # For tailnet address (<mach>.<tailnet>.ts.net) lookups.
      - 1.1.1.1 # For external lookups.
    environment:
      - "TS_AUTHKEY=${TS_AUTH_KEY}"
      # - "TS_EXTRA_ARGS=--advertise-tags=tag:container"
      - "TS_SERVE_CONFIG=/config/node-exporter.json"
      - "TS_STATE_DIR=/var/lib/tailscale"
      - "TS_USERSPACE=false"
    hostname: node-exporter
    image: tailscale/tailscale:v1.94.2
    restart: unless-stopped
    volumes:
      - ${PWD}/tailscale-node-exporter-data/state:/var/lib/tailscale
      - ${PWD}/config:/config
    labels:
      - 'wud.tag.include=^v\d+\.\d+\.\d+$$'
      - "wud.link.template=https://github.com/tailscale/tailscale/releases/tag/$${major}.$${minor}.$${patch}"
  ts-tandoor:
    stop_grace_period: 30s
    cap_add:
      - net_admin
      - sys_module
    container_name: ts-tandoor
    devices:
      - /dev/net/tun:/dev/net/tun
    dns:
      - 100.100.100.100 # For tailnet address (<mach>.<tailnet>.ts.net) lookups.
      - 1.1.1.1 # For external lookups.
    environment:
      - "TS_AUTHKEY=${TS_AUTH_KEY}"
      # - "TS_EXTRA_ARGS=--advertise-tags=tag:container"
      - "TS_SERVE_CONFIG=/config/tandoor.json"
      - "TS_STATE_DIR=/var/lib/tailscale"
      - "TS_USERSPACE=false"
    hostname: tandoor
    image: tailscale/tailscale:v1.94.2
    restart: unless-stopped
    volumes:
      - ${PWD}/tailscale-tandoor-data/state:/var/lib/tailscale
      - ${PWD}/config:/config
    labels:
      - 'wud.tag.include=^v\d+\.\d+\.\d+$$'
      - "wud.link.template=https://github.com/tailscale/tailscale/releases/tag/$${major}.$${minor}.$${patch}"
  netalertx:
    container_name: netalertx # The name when you docker contiainer ls
    image: ghcr.io/jokob-sk/netalertx:26.3.15
    stop_grace_period: 30s
    network_mode: ${NETALERTX_NETWORK_MODE:-host} # Use host networking for ARP scanning and other services
    read_only: true # Make the container filesystem read-only
    cap_drop: # Drop all capabilities for enhanced security
      - ALL
    cap_add: # Add only the necessary capabilities
      - NET_ADMIN # Required for ARP scanning
      - NET_RAW # Required for raw socket operations
      - NET_BIND_SERVICE # Required to bind to privileged ports (nbtscan)
      - CHOWN # Required for root-entrypoint to chown /data + /tmp before dropping privileges
      - SETUID # Required for root-entrypoint to switch to non-root user
      - SETGID # Required for root-entrypoint to switch to non-root group
    volumes:
      - type: volume # Persistent Docker-managed named volume for config + database
        source: netalertx_data
        target: /data # `/data/config` and `/data/db` live inside this mount
        read_only: false
      - type: bind # Bind mount for timezone consistency
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
    tmpfs:
      - "/tmp:uid=${NETALERTX_UID:-20211},gid=${NETALERTX_GID:-20211},mode=1700,rw,noexec,nosuid,nodev,async,noatime,nodiratime"
    environment:
      LISTEN_ADDR: ${LISTEN_ADDR:-0.0.0.0} # Listen for connections on all interfaces
      PORT: ${PORT:-20211} # Application port
      GRAPHQL_PORT: ${GRAPHQL_PORT:-20212} # GraphQL API port (passed into APP_CONF_OVERRIDE at runtime)
    #    NETALERTX_DEBUG: ${NETALERTX_DEBUG:-0}                 # 0=kill all services and restart if any dies. 1 keeps running dead services.
    mem_limit: 2048m # Maximum memory usage
    mem_reservation: 1024m # Soft memory limit
    cpu_shares: 512 # Relative CPU weight for CPU contention scenarios
    pids_limit: 512 # Limit the number of processes/threads to prevent fork bombs
    logging:
      driver: "json-file" # Use JSON file logging driver
      options:
        max-size: "10m" # Rotate log files after they reach 10MB
        max-file: "3" # Keep a maximum of 3 log files
    restart: unless-stopped
    labels:
      - "tsbridge.enabled=true"
      - "tsbridge.service.name=netalertx"
      - "tsbridge.service.backend_addr=host.docker.internal:20211"
      - "tsbridge.service.tags=tag:homelab"
volumes:
  staticfiles:
  netalertx_data:
  tandoor_pg_data:
  hofvarpnir_pg_data:
  tsbridge_state:
