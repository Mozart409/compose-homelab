services:
  tsbridge:
    image: ghcr.io/jtdowney/tsbridge:v0.15.0
    container_name: tsbridge
    command: ["--provider", "docker"]
    restart: unless-stopped
    stop_grace_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - tsbridge_state:/var/lib/tsbridge
    environment:
      - TS_OAUTH_CLIENT_ID=${TS_OAUTH_CLIENT_ID}
      - TS_OAUTH_CLIENT_SECRET=${TS_OAUTH_CLIENT_SECRET}
    labels:
      - "tsbridge.tailscale.oauth_client_id_env=TS_OAUTH_CLIENT_ID"
      - "tsbridge.tailscale.oauth_client_secret_env=TS_OAUTH_CLIENT_SECRET"
      - "tsbridge.tailscale.state_dir=/var/lib/tsbridge"
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    container_name: node_exporter
    stop_grace_period: 30s
    command:
      - "--path.rootfs=/host"
    pid: host
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:9100/metrics
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - "/:/host:ro,rslave"
    labels:
      - 'wud.tag.include=^v\d+\.\d+\.\d+$$'
      - "tsbridge.enabled=true"
      - "tsbridge.service.name=jellyfin-node-exporter"
      - "tsbridge.service.port=9100"
      - "tsbridge.service.write_timeout=0s"
      - "tsbridge.service.flush_interval=-1ms"
      - "tsbridge.service.tags=tag:homelab"
  whatsupdocker:
    image: ghcr.io/getwud/wud:8.2.2
    tty: true
    stdin_open: true
    container_name: wud
    stop_grace_period: 30s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: curl --fail http://localhost:${WUD_SERVER_PORT:-3000}/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - 'wud.tag.include=^\d+\.\d+\.\d+$$'
      - "wud.link.template=https://github.com/getwud/wud/releases/tag/$${major}.$${minor}.$${patch}"
      - "tsbridge.enabled=true"
      - "tsbridge.service.name=wud"
      - "tsbridge.service.port=3000"
      - "tsbridge.service.tags=tag:homelab"
  valkey-searxng:
    container_name: valkey-searxng
    image: valkey/valkey:9.1.0-alpine3.23
    restart: unless-stopped
    stop_grace_period: 30s
    command: valkey-server --bind 0.0.0.0
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      - 'wud.tag.include=^\d+\.\d+\.\d+-alpine'
      - "wud.link.template=https://github.com/valkey-io/valkey/releases/tag/$${major}.$${minor}.$${patch}"
  searxng:
    container_name: searxng
    stop_grace_period: 30s
    depends_on:
      valkey-searxng:
        condition: service_healthy
    environment:
      - BASE_URL=https://searxng.dropbear-butterfly.ts.net/
      - INSTANCE_NAME=SearxNG
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    healthcheck:
      interval: 1m30s
      retries: 3
      start_period: 40s
      test: ["CMD", "wget", "-nv", "-t1", "--spider", "0.0.0.0:8080/"]
      timeout: 10s
    image: searxng/searxng:2025.12.30-a5c946a32
    labels:
      - homepage.group=Search
      - homepage.name=SearxNG
      - homepage.icon=emby.png
      - homepage.href=http://searxng.home/
      - homepage.description=Meta search engine
      - 'wud.tag.include=^v\d+\.\d+\.\d+$$'
      - "wud.link.template=https://github.com/searxng/searxng/releases/tag/$${major}.$${minor}.$${patch}"
      - "tsbridge.enabled=true"
      - "tsbridge.service.name=searxng"
      - "tsbridge.service.port=8080"
      - "tsbridge.service.whois_enabled=true"
      - "tsbridge.service.upstream_headers.X-Real-IP=127.0.0.1"
      - "tsbridge.service.upstream_headers.X-Forwarded-For=127.0.0.1"
      - "tsbridge.service.upstream_headers.X-Forwarded-Proto=https"
      - "tsbridge.service.tags=tag:homelab"
    restart: unless-stopped
    volumes:
      - ${PWD}/searxng:/etc/searxng
volumes:
  tsbridge_state:
